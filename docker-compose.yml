services:
  claude-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ}
        USERNAME: ${USERNAME}
        NVM_VERSION: ${NVM_VERSION}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION}
        EAS_CLI_VERSION: ${EAS_CLI_VERSION}
        GIT_DELTA_VERSION: ${GIT_DELTA_VERSION}
        GO_VERSION: ${GO_VERSION}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
      - SYSLOG
    environment:
      - ANTHROPIC_API_KEY
      - BROWSER
      - CLAUDE_CONFIG_DIR
      - EDITOR
      - GH_TOKEN
      - GITHUB_PERSONAL_ACCESS_TOKEN
      - LANG
      - LC_ALL
      - NODE_OPTIONS
      - SHELL
      - SOPHIE_CLAUDE_SANDBOX
      - TERM
      - VISUAL
    user: ${USERNAME}
    working_dir: /home/${USERNAME}
    volumes:
      # Code directory
      - ~/Code:/home/${USERNAME}/Code:delegated
      # Zsh config
      - ~/.zshrc:/home/${USERNAME}/.zshrc:ro
      - ~/.zshenv:/home/${USERNAME}/.zshenv:ro
      - ~/.zsh:/home/${USERNAME}/.zsh:ro
      # Git config
      - ~/.gitconfig:/home/${USERNAME}/.gitconfig:ro
      - ~/.gitconfig-karaconnect:/home/${USERNAME}/.gitconfig-karaconnect:ro
      # SSH config and keys
      - ~/.ssh:/home/${USERNAME}/.ssh:ro
      # Host DNS aliases
      - /etc/hosts:/etc/hosts.host:ro
      # Package manager configs
      - ~/.npmrc:/home/${USERNAME}/.npmrc:ro
      - ~/.bunfig.toml:/home/${USERNAME}/.bunfig.toml:ro
      # Persistent volumes
      - ~/.claude-sandbox:/home/${USERNAME}/.claude
      - ~/.claude-karaconnect-sandbox:/home/${USERNAME}/.claude-karaconnect
      - gh-config:/home/${USERNAME}/.config/gh
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "host-machine.local:host-gateway"
    stdin_open: true
    tty: true
    entrypoint: ["/bin/zsh"]

volumes:
  gh-config:
